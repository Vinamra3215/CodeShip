services:
  postgres:
    image: postgres:16-alpine
    container_name: codeship_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: codeship
      POSTGRES_USER: codeship
      POSTGRES_PASSWORD: codeship
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: codeship_redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  pgdata:
